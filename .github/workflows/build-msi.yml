name: Build Windows installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release with the artifact'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # No code-signing cert wired up yet; skip discovery in CI.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      # Hide the noisy Wine debug stream.
      WINEDEBUG: '-all'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Wine (needed by electron-builder to invoke WiX for MSI)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wine64 wine32

      - name: Install root deps
        run: npm ci

      # We deliberately do NOT run `electron-builder install-app-deps` here.
      # The native addon (native/mano-hook) can't cross-compile from Linux;
      # it must be prebuilt on Windows once and committed to
      # `native/mano-hook/prebuilds/win32-x64/`. node-gyp-build picks the
      # prebuilt binary up at runtime on the target machine.
      - name: Verify Windows prebuilt addon is present
        run: |
          if ! ls native/mano-hook/prebuilds/win32-x64/*.node >/dev/null 2>&1; then
            echo "::error::No prebuilt addon under native/mano-hook/prebuilds/win32-x64/."
            echo "Run on a Windows machine: npm --prefix native/mano-hook run prebuild"
            echo "Then commit the resulting prebuilds/ folder."
            exit 1
          fi
          ls -la native/mano-hook/prebuilds/win32-x64/

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer + main + preload
        run: npm run build

      # MSI is best-effort: WiX under Wine is the flakier of the two paths.
      # If it fails we still want a usable installer, so the NSIS step below
      # is the required one. `id` + `continue-on-error` lets us record the
      # outcome and surface it later.
      - name: Package MSI (best-effort, runs WiX under Wine)
        id: msi
        continue-on-error: true
        run: npx electron-builder --win msi --x64 --publish never

      - name: Note MSI outcome
        run: |
          if [ "${{ steps.msi.outcome }}" = "success" ]; then
            echo "::notice::MSI build succeeded."
          else
            echo "::warning::MSI build failed under Wine — falling back to NSIS only."
          fi

      # NSIS cross-builds cleanly from Linux (no Wine for WiX needed), so
      # this is the guaranteed-good output.
      - name: Package NSIS installer (required)
        run: npx electron-builder --win nsis --x64 --publish never

      - name: List release artifacts
        run: ls -la release/

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: mano-hotkeys-windows-installers
          path: |
            release/*.msi
            release/*.msi.blockmap
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release == true
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.msi
            release/*.msi.blockmap
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: false
